<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Co-Revise — IMAGES (QJE)</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #151515;
      --muted: #626871;
      --line: #d9dde3;
      --paper: #ffffff;
      --wash: #f3f7f6;
      --red: #b33426;
      --blue: #1f5f97;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(31, 95, 151, 0.08) 0 1px, transparent 1px 100%),
        linear-gradient(180deg, rgba(22, 116, 97, 0.06), rgba(179, 52, 38, 0.04) 46%, var(--wash) 100%);
      background-size: 22px 22px, 100% 100%;
      font-family: "Avenir Next", "Segoe UI", Helvetica, sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(100%, 460px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 16px 42px rgba(20, 24, 31, 0.12);
    }

    .kicker {
      margin: 0 0 12px;
      color: var(--red);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 12vw, 3.5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .paper-subtitle {
      max-width: 760px;
      margin: 16px 0 0;
      color: #2a2f37;
      font-size: clamp(0.95rem, 2.1vw, 1.18rem);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.4;
    }

    .paper-subtitle .em-dash {
      color: var(--muted);
      padding: 0 0.18em;
    }

    .copy {
      margin: 18px 0 24px;
      color: #353b43;
      font-size: 1rem;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid #c8ced6;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .error,
    .note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .error {
      display: none;
      padding: 10px 12px;
      border: 1px solid rgba(179, 52, 38, 0.28);
      border-radius: 8px;
      background: rgba(179, 52, 38, 0.08);
      color: var(--red);
      font-weight: 800;
    }

    .is-error .error { display: block; }
  </style>
</head>

    </form>
    <p id="error" class="error">That password did not work.</p>
    <p class="note">This page is encrypted in the browser. Use the shared team password.</p>
  </main>

    };

    const textEncoder = new TextEncoder();
    const textDecoder = new TextDecoder();
    const panel = document.querySelector("#unlockPanel");
    const form = document.querySelector("#unlockForm");
    const input = document.querySelector("#password");
    const button = document.querySelector("#submitButton");

    function fromBase64(value) {
      return Uint8Array.from(atob(value), character => character.charCodeAt(0));
    }

    async function decrypt(password) {
      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        textEncoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      const key = await crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: fromBase64(encryptedBrief.salt),
          iterations: encryptedBrief.iterations,
          hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
      const bytes = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: fromBase64(encryptedBrief.iv) },
        key,
        fromBase64(encryptedBrief.payload)
      );
      return textDecoder.decode(bytes);
    }

    async function unlock(password) {
      panel.classList.remove("is-error");
      button.disabled = true;
      button.textContent = "Opening...";

      try {
        const html = await decrypt(password);
        sessionStorage.setItem("coReviseSessionPassword", password);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        sessionStorage.removeItem("coReviseSessionPassword");
        panel.classList.add("is-error");
        button.disabled = false;
        button.textContent = "Open Brief";
        input.select();
      }
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      unlock(input.value);
    });

    const rememberedPassword = sessionStorage.getItem("coReviseSessionPassword");
    if (rememberedPassword) {
      unlock(rememberedPassword);
    }
  </script>
